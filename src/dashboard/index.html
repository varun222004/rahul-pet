<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rahul's Pit Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <div class="titlebar">
    <div class="titlebar-title">🧢 RAHUL'S PIT WALL</div>
    <button class="close-btn" id="closeBtn">✕</button>
  </div>

  <div class="quote-bar" id="quoteBar"></div>

  <div class="main">

    <!-- Add Project Form -->
    <div class="add-project-bar">
      <input type="text" id="newProjectName" placeholder="NEW PROJECT NAME..." maxlength="30" />
      <select id="newProjectTag">
  <option value="dev">DEV</option>
  <option value="qa">QA</option>
  <option value="auto">AUTO</option>
  <option value="research">RESEARCH</option>
  <option value="learning">LEARNING</option>
  <option value="other">OTHER</option>
</select>
      <button id="addProjectBtn">+ ADD</button>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid" id="projectsGrid"></div>

  </div>

  <!-- Notes Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">NOTES</div>
      <textarea id="modalNotes" placeholder="Add notes, comments, links..."></textarea>
      <div class="modal-actions">
        <button id="saveNotes">SAVE</button>
        <button id="cancelNotes">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
